<svg xmlns="http://www.w3.org/2000/svg" width="32px" height="32px" viewBox="0 0 32 32">
  <defs>
    <style>
      .cube-line {
        stroke: #FFFFFF;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .cube-line-thin {
        stroke: #FFFFFF;
        stroke-width: 1.0;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
    </style>
  </defs>
  
  <g>
    <!-- Front face - main rectangle with rounded corners -->
    <path class="cube-line" 
          d="M 9.5,11.5 
             C 9.5,10.5 10.5,9.5 11.5,9.5 
             L 21.5,9.5 
             C 22.5,9.5 23.5,10.5 23.5,11.5 
             L 23.5,22.5 
             C 23.5,23.5 22.5,24.5 21.5,24.5 
             L 11.5,24.5 
             C 10.5,24.5 9.5,23.5 9.5,22.5 
             Z"/>
    
    <!-- Top face - isometric with rounded corners -->
    <path class="cube-line" 
          d="M 11.5,9.5 
             L 16.0,5.0 
             C 16.5,4.5 17.5,4.5 18.0,5.0 
             L 23.5,9.5"/>
    
    <!-- Right face -->
    <path class="cube-line" 
          d="M 23.5,11.5 
             L 27.5,15.5 
             C 28.0,16.0 28.0,17.0 27.5,17.5 
             L 23.5,22.5"/>
    
    <!-- Inner edge (thin line for depth) -->
    <path class="cube-line-thin" 
          d="M 16.0,5.0 L 16.0,24.5"/>
    
    <!-- Bottom edge of right face -->
    <path class="cube-line" 
          d="M 23.5,22.5 L 27.5,18.5"/>
    
    <!-- Left vertical edge -->
    <path class="cube-line" 
          d="M 9.5,11.5 L 16.0,5.0"/>
  </g>
</svg>
