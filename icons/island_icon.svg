<svg xmlns="http://www.w3.org/2000/svg" width="32px" height="32px" viewBox="0 0 32 32">
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Front face (with rounded corners) -->
    <path d="M 9.5,10.5 
             L 22.5,10.5 
             Q 23.5,10.5 23.5,11.5 
             L 23.5,22.5 
             Q 23.5,23.5 22.5,23.5 
             L 9.5,23.5 
             Q 8.5,23.5 8.5,22.5 
             L 8.5,11.5 
             Q 8.5,10.5 9.5,10.5 Z"/>
    
    <!-- Top face (isometric with rounded corners) -->
    <path d="M 9.5,10.5 
             L 16.0,5.5 
             Q 17.0,5.0 17.5,6.0 
             L 23.5,10.5"/>
    
    <!-- Right face (isometric with rounded corners) -->
    <path d="M 23.5,10.5 
             L 27.5,14.5 
             Q 28.0,15.0 27.5,15.5 
             L 23.5,22.5"/>
    
    <!-- Bottom edge of right face -->
    <path d="M 23.5,22.5 L 27.5,18.5"/>
    
    <!-- Left edge connection -->
    <path d="M 8.5,11.5 L 16.0,5.5"/>
    
  </g>
</svg>
